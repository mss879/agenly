[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # These NEXT_PUBLIC_* vars are intentionally embedded in the client bundle by Next.js.
  # They are NOT secrets — they are public-facing config values.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_PLATFORM_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_URL"
